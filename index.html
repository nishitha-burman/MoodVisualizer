<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mood Visualizer</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: linear-gradient(135deg, #1a0533 0%, #0d1b3e 50%, #1a0533 100%);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        color: #f0e6ff;
      }
      #app {
        position: relative;
        width: 100%;
        height: 100%;
      }
      canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }
      #ui-overlay {
        position: absolute;
        bottom: 40px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
        z-index: 10;
      }
      #input-row {
        display: flex;
        gap: 8px;
      }
      #mood-input {
        width: 320px;
        padding: 12px 16px;
        border: 1px solid rgba(255, 200, 255, 0.25);
        border-radius: 12px;
        background: rgba(30, 10, 60, 0.7);
        backdrop-filter: blur(12px);
        color: #f0e6ff;
        font-size: 15px;
        outline: none;
        transition: border-color 0.3s, box-shadow 0.3s;
      }
      #mood-input:focus {
        border-color: rgba(255, 200, 80, 0.6);
        box-shadow: 0 0 12px rgba(255, 200, 80, 0.2);
      }
      #mood-input::placeholder {
        color: rgba(220, 180, 255, 0.45);
      }
      #visualize-btn {
        padding: 12px 20px;
        border: none;
        border-radius: 12px;
        background: linear-gradient(135deg, #f5c542, #e8a020);
        color: #1a0533;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s;
        box-shadow: 0 2px 10px rgba(245, 197, 66, 0.3);
      }
      #visualize-btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 16px rgba(245, 197, 66, 0.45);
      }
      #presets {
        display: flex;
        gap: 8px;
      }
      .preset-btn {
        padding: 6px 14px;
        border: none;
        border-radius: 16px;
        backdrop-filter: blur(8px);
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s, filter 0.2s;
      }
      .preset-btn:hover {
        transform: translateY(-2px);
        filter: brightness(1.15);
      }
      /* Inside Out character colors for each preset */
      .preset-btn[data-mood="calm"] {
        background: linear-gradient(135deg, #6ec6ff, #42a5f5);
        color: #0d1b3e;
        box-shadow: 0 2px 8px rgba(66, 165, 245, 0.3);
      }
      .preset-btn[data-mood="anxious"] {
        background: linear-gradient(135deg, #ffb74d, #f57c00);
        color: #3e1a00;
        box-shadow: 0 2px 8px rgba(245, 124, 0, 0.3);
      }
      .preset-btn[data-mood="joyful"] {
        background: linear-gradient(135deg, #ffe14d, #ffc107);
        color: #3e2e00;
        box-shadow: 0 2px 8px rgba(255, 193, 7, 0.35);
      }
      .preset-btn[data-mood="melancholy"] {
        background: linear-gradient(135deg, #7986cb, #3f51b5);
        color: #e8eaf6;
        box-shadow: 0 2px 8px rgba(63, 81, 181, 0.3);
      }
      .preset-btn[data-mood="angry"] {
        background: linear-gradient(135deg, #ef5350, #d32f2f);
        color: #fff;
        box-shadow: 0 2px 8px rgba(211, 47, 47, 0.35);
      }
      .preset-btn[data-mood="dreamy"] {
        background: linear-gradient(135deg, #ce93d8, #9c27b0);
        color: #f3e5f5;
        box-shadow: 0 2px 8px rgba(156, 39, 176, 0.3);
      }
      #fallback-msg {
        display: none;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        padding: 32px;
        max-width: 480px;
      }
      #fallback-msg h2 {
        margin-bottom: 12px;
        color: #ef5350;
      }
      #fallback-msg p {
        color: rgba(220, 180, 255, 0.7);
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <canvas id="gpu-canvas"></canvas>
      <div id="ui-overlay">
        <div id="input-row">
          <input id="mood-input" type="text" placeholder="How are you feeling?" autocomplete="off" />
          <button id="visualize-btn">Visualize</button>
        </div>
        <div id="presets">
          <button class="preset-btn" data-mood="calm">calm</button>
          <button class="preset-btn" data-mood="anxious">anxious</button>
          <button class="preset-btn" data-mood="joyful">joyful</button>
          <button class="preset-btn" data-mood="melancholy">melancholy</button>
          <button class="preset-btn" data-mood="angry">angry</button>
          <button class="preset-btn" data-mood="dreamy">dreamy</button>
        </div>
      </div>
      <div id="fallback-msg">
        <h2>WebGPU Not Available</h2>
        <p>
          This app requires WebGPU. Please use the latest version of Chrome or Edge
          with WebGPU enabled. You may need to enable it via
          <code>chrome://flags/#enable-unsafe-webgpu</code>.
        </p>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
