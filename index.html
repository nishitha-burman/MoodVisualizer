<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mood Visualizer</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: linear-gradient(135deg, #1a0533 0%, #0d1b3e 50%, #1a0533 100%);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        color: #f0e6ff;
      }
      #app {
        position: relative;
        width: 100%;
        height: 100%;
      }
      canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }
      #ui-overlay {
        position: absolute;
        bottom: 40px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
        z-index: 10;
      }
      #input-row {
        display: flex;
        gap: 8px;
      }
      #mood-input {
        width: 320px;
        padding: 12px 16px;
        border: 1px solid rgba(255, 200, 255, 0.25);
        border-radius: 12px;
        background: rgba(30, 10, 60, 0.7);
        backdrop-filter: blur(12px);
        color: #f0e6ff;
        font-size: 15px;
        outline: none;
        transition: border-color 0.3s, box-shadow 0.3s;
      }
      #mood-input:focus {
        border-color: rgba(255, 200, 80, 0.6);
        box-shadow: 0 0 12px rgba(255, 200, 80, 0.2);
      }
      #mood-input::placeholder {
        color: rgba(220, 180, 255, 0.45);
      }
      #visualize-btn {
        padding: 12px 20px;
        border: none;
        border-radius: 12px;
        background: linear-gradient(135deg, #f5c542, #e8a020);
        color: #1a0533;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s;
        box-shadow: 0 2px 10px rgba(245, 197, 66, 0.3);
      }
      #visualize-btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 16px rgba(245, 197, 66, 0.45);
      }
      #presets {
        display: flex;
        gap: 8px;
      }
      .preset-btn {
        padding: 6px 14px;
        border: none;
        border-radius: 16px;
        backdrop-filter: blur(8px);
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s, filter 0.2s;
      }
      .preset-btn:hover {
        transform: translateY(-2px);
        filter: brightness(1.15);
      }
      /* Default character colors for each preset (overridden dynamically by theme) */
      .preset-btn[data-mood="happy"] {
        background: linear-gradient(135deg, #ffe14d, #ffc107);
        color: #3e2e00;
        box-shadow: 0 2px 8px rgba(255, 193, 7, 0.35);
      }
      .preset-btn[data-mood="sad"] {
        background: linear-gradient(135deg, #7986cb, #3f51b5);
        color: #e8eaf6;
        box-shadow: 0 2px 8px rgba(63, 81, 181, 0.3);
      }
      .preset-btn[data-mood="calm"] {
        background: linear-gradient(135deg, #6ec6ff, #42a5f5);
        color: #0d1b3e;
        box-shadow: 0 2px 8px rgba(66, 165, 245, 0.3);
      }
      .preset-btn[data-mood="anxious"] {
        background: linear-gradient(135deg, #ffb74d, #f57c00);
        color: #3e1a00;
        box-shadow: 0 2px 8px rgba(245, 124, 0, 0.3);
      }
      .preset-btn[data-mood="angry"] {
        background: linear-gradient(135deg, #ef5350, #d32f2f);
        color: #fff;
        box-shadow: 0 2px 8px rgba(211, 47, 47, 0.35);
      }
      .preset-btn[data-mood="confident"] {
        background: linear-gradient(135deg, #f5c542, #e8a020);
        color: #1a0533;
        box-shadow: 0 2px 8px rgba(245, 197, 66, 0.3);
      }
      #fallback-msg {
        display: none;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        padding: 32px;
        max-width: 480px;
      }
      #fallback-msg h2 {
        margin-bottom: 12px;
        color: #ef5350;
      }
      #fallback-msg p {
        color: rgba(220, 180, 255, 0.7);
        line-height: 1.5;
      }

      /* Quiz overlay */
      #quiz-overlay {
        display: none;
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 100;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 32px;
        background: rgba(10, 2, 25, 0.75);
        backdrop-filter: blur(16px);
        animation: quiz-fade-in 0.4s ease-out;
      }
      #quiz-overlay.quiz-exit {
        animation: quiz-fade-out 0.4s ease-in forwards;
      }
      @keyframes quiz-fade-in {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes quiz-fade-out {
        from { opacity: 1; }
        to { opacity: 0; }
      }
      #quiz-question {
        font-size: 24px;
        font-weight: 600;
        text-align: center;
        color: #f0e6ff;
        max-width: 400px;
      }
      #quiz-swatches {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 16px;
        max-width: 360px;
      }
      .quiz-swatch {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        border: 3px solid transparent;
        cursor: pointer;
        transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }
      .quiz-swatch:hover {
        transform: scale(1.15);
        border-color: rgba(255, 255, 255, 0.5);
      }
      .quiz-swatch.selected {
        transform: scale(1.2);
        border-color: #fff;
        box-shadow: 0 0 16px rgba(255, 255, 255, 0.4);
      }
      .quiz-swatch-picker {
        background: conic-gradient(
          hsl(0, 80%, 60%),
          hsl(60, 80%, 60%),
          hsl(120, 80%, 60%),
          hsl(180, 80%, 60%),
          hsl(240, 80%, 60%),
          hsl(300, 80%, 60%),
          hsl(360, 80%, 60%)
        ) !important;
        position: relative;
      }
      #quiz-progress {
        display: flex;
        gap: 8px;
      }
      .quiz-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.2);
        transition: background 0.3s, transform 0.3s;
      }
      .quiz-dot.active {
        background: #f5c542;
        transform: scale(1.3);
      }
      .quiz-dot.completed {
        background: rgba(245, 197, 66, 0.5);
      }
      #quiz-skip {
        background: none;
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: rgba(220, 180, 255, 0.6);
        padding: 8px 16px;
        border-radius: 8px;
        font-size: 13px;
        cursor: pointer;
        transition: color 0.2s, border-color 0.2s;
      }
      #quiz-skip:hover {
        color: #f0e6ff;
        border-color: rgba(255, 255, 255, 0.4);
      }

      /* Settings gear */
      #settings-btn {
        position: absolute;
        top: 16px;
        right: 16px;
        z-index: 10;
        width: 36px;
        height: 36px;
        border-radius: 50%;
        border: 1px solid rgba(255, 200, 255, 0.2);
        background: rgba(30, 10, 60, 0.6);
        backdrop-filter: blur(8px);
        color: rgba(220, 180, 255, 0.7);
        font-size: 18px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: color 0.2s, border-color 0.2s, transform 0.3s;
      }
      #settings-btn:hover {
        color: #f0e6ff;
        border-color: rgba(255, 200, 255, 0.5);
        transform: rotate(45deg);
      }
    </style>
  </head>
  <body>
    <div id="app">
      <canvas id="gpu-canvas"></canvas>
      <button id="settings-btn" title="Color theme settings">⚙</button>
      <div id="quiz-overlay">
        <p id="quiz-question"></p>
        <div id="quiz-swatches"></div>
        <div id="quiz-progress"></div>
        <button id="quiz-skip">Skip — use defaults</button>
      </div>
      <div id="ui-overlay">
        <div id="input-row">
          <input id="mood-input" type="text" placeholder="How are you feeling?" autocomplete="off" />
          <button id="visualize-btn">Visualize</button>
        </div>
        <div id="presets">
          <button class="preset-btn" data-mood="happy">happy</button>
          <button class="preset-btn" data-mood="sad">sad</button>
          <button class="preset-btn" data-mood="calm">calm</button>
          <button class="preset-btn" data-mood="anxious">anxious</button>
          <button class="preset-btn" data-mood="angry">angry</button>
          <button class="preset-btn" data-mood="confident">confident</button>
        </div>
      </div>
      <div id="fallback-msg">
        <h2>WebGPU Not Available</h2>
        <p>
          This app requires WebGPU. Please use the latest version of Chrome or Edge
          with WebGPU enabled. You may need to enable it via
          <code>chrome://flags/#enable-unsafe-webgpu</code>.
        </p>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
