<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mood Visualizer</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0a0a0f;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        color: #e0e0e0;
      }
      #app {
        position: relative;
        width: 100%;
        height: 100%;
      }
      canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }
      #ui-overlay {
        position: absolute;
        bottom: 40px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
        z-index: 10;
      }
      #input-row {
        display: flex;
        gap: 8px;
      }
      #mood-input {
        width: 320px;
        padding: 12px 16px;
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 8px;
        background: rgba(10, 10, 15, 0.8);
        backdrop-filter: blur(12px);
        color: #e0e0e0;
        font-size: 15px;
        outline: none;
        transition: border-color 0.2s;
      }
      #mood-input:focus {
        border-color: rgba(255, 255, 255, 0.4);
      }
      #mood-input::placeholder {
        color: rgba(255, 255, 255, 0.35);
      }
      #visualize-btn {
        padding: 12px 20px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(12px);
        color: #e0e0e0;
        font-size: 15px;
        cursor: pointer;
        transition: background 0.2s, border-color 0.2s;
      }
      #visualize-btn:hover {
        background: rgba(255, 255, 255, 0.14);
        border-color: rgba(255, 255, 255, 0.35);
      }
      #presets {
        display: flex;
        gap: 8px;
      }
      .preset-btn {
        padding: 6px 14px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(8px);
        color: rgba(255, 255, 255, 0.7);
        font-size: 13px;
        cursor: pointer;
        transition: background 0.2s, color 0.2s;
      }
      .preset-btn:hover {
        background: rgba(255, 255, 255, 0.12);
        color: #fff;
      }
      #fallback-msg {
        display: none;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        padding: 32px;
        max-width: 480px;
      }
      #fallback-msg h2 {
        margin-bottom: 12px;
        color: #ff6b6b;
      }
      #fallback-msg p {
        color: rgba(255, 255, 255, 0.6);
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <canvas id="gpu-canvas"></canvas>
      <div id="ui-overlay">
        <div id="input-row">
          <input id="mood-input" type="text" placeholder="How are you feeling?" autocomplete="off" />
          <button id="visualize-btn">Visualize</button>
        </div>
        <div id="presets">
          <button class="preset-btn" data-mood="calm">calm</button>
          <button class="preset-btn" data-mood="anxious">anxious</button>
          <button class="preset-btn" data-mood="joyful">joyful</button>
          <button class="preset-btn" data-mood="melancholy">melancholy</button>
          <button class="preset-btn" data-mood="angry">angry</button>
          <button class="preset-btn" data-mood="dreamy">dreamy</button>
        </div>
      </div>
      <div id="fallback-msg">
        <h2>WebGPU Not Available</h2>
        <p>
          This app requires WebGPU. Please use the latest version of Chrome or Edge
          with WebGPU enabled. You may need to enable it via
          <code>chrome://flags/#enable-unsafe-webgpu</code>.
        </p>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
